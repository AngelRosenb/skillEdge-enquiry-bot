<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillEdge Enquiry Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #ECE5DD; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { width: 420px; height: 620px; background: white; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    #header { background: #128C7E; color: white; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    #header .avatar { width: 38px; height: 38px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    #header .info .name { font-weight: bold; font-size: 15px; }
    #header .info .status { font-size: 11px; opacity: 0.85; }
    #messages { flex: 1; overflow-y: auto; padding: 12px; background: #ECE5DD; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
    .msg.bot { background: white; align-self: flex-start; border-top-left-radius: 2px; }
    .msg.user { background: #DCF8C6; align-self: flex-end; border-top-right-radius: 2px; }
    #input-area { display: flex; padding: 10px; gap: 8px; background: #F0F0F0; }
    #msg-input { flex: 1; border: none; border-radius: 20px; padding: 10px 14px; font-size: 13px; outline: none; }
    #send-btn { background: #128C7E; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="header">
      <div class="avatar">🎓</div>
      <div class="info">
        <div class="name">SkillEdge Academy</div>
        <div class="status">Online</div>
      </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" type="text" placeholder="Type a message..." />
      <button id="send-btn">&#9658;</button>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.innerText = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();
      addMessage(data.reply, "bot");
    }

    sendBtn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") sendMessage();
    });

    // Show welcome message on load
    window.onload = function() {
      addMessage("👋 Hello! Welcome to SkillEdge Academy. Ask me about our courses or type 'enroll' to get started!", "bot");
    };
  </script>
</body>
</html>
